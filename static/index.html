<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opportunity Router</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .deal { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 0.75rem; }
    .org { font-weight: 600; font-size: 1.05rem; }
    .meta { color: #666; font-size: 0.85rem; margin-top: 0.25rem; }
    .empty { color: #888; }
    .error { color: #b00; background: #fee; padding: 1rem; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="root">Loading…</div>

  <script>
    if (!window.React || !window.ReactDOM) {
      document.getElementById("root").innerHTML =
        '<div class="error">React did not load from the CDN. Check the Network tab.</div>';
    }
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function Dashboard() {
      const [opportunities, setOpportunities] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch("/opportunities")
          .then((res) => {
            if (!res.ok) throw new Error("API returned " + res.status);
            return res.json();
          })
          .then((data) => {
            setOpportunities(data.opportunities || []);
            setLoading(false);
          })
          .catch((err) => {
            setError(err.message);
            setLoading(false);
          });
      }, []);

      if (loading) return <p>Loading…</p>;
      if (error) return <div className="error">Could not load opportunities: {error}</div>;

      return (
        <div>
          <h1>Opportunity Router</h1>
          <p className="meta">{opportunities.length} opportunit{opportunities.length === 1 ? "y" : "ies"} in the pipeline</p>
          {opportunities.length === 0 ? (
            <p className="empty">No opportunities yet. Run one through /qualify to see it here.</p>
          ) : (
            opportunities.map((o) => (
              <div className="deal" key={o.id}>
                <div className="org">{o.organization || "Unparsed document"}</div>
                <div className="meta">
                  {o.service_line || "—"} / {o.engagement_type || "—"} · fit {o.fit_score ?? "—"} ({o.fit_band || "—"}) · status: {o.status}
                </div>
              </div>
            ))
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
